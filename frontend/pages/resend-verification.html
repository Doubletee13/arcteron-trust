<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resend Verification — Arcteron Trust</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/theme.js"></script>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }

        .verification-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
        }

        .logo-section h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px 0;
        }

        .logo-section p {
            font-size: 12px;
            color: var(--text-muted);
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--text-primary);
        }

        .submit-button {
            width: 100%;
            padding: 14px 24px;
            background: var(--text-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-button:hover {
            opacity: 0.85;
        }

        .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
        }

        .back-link a:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10B981;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        @media (max-width: 480px) {
            .verification-container {
                padding: 24px;
                margin: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="verification-container">
        <div class="logo-section">
            <svg class="logo-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5" opacity="0.3" />
                <path d="M20 8 L30 28 H24 L20 20 L16 28 H10 Z" fill="currentColor" opacity="0.9" />
                <path d="M14 23 H26" stroke="currentColor" stroke-width="1.5" opacity="0.6" />
                <circle cx="20" cy="6" r="2" fill="currentColor" opacity="0.5" />
            </svg>
            <h1>Arcteron Trust</h1>
            <p>Private Banking & Wealth Management</p>
        </div>

        <h2 class="form-title">Resend Verification Email</h2>
        <p class="form-subtitle">Enter your email address to receive a new verification link.</p>

        <div id="alertSuccess" class="alert alert-success">
            Verification email sent successfully. Please check your inbox.
        </div>

        <div id="alertError" class="alert alert-error">
            Failed to send verification email. Please try again.
        </div>

        <form id="resendForm" onsubmit="handleResend(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <button type="submit" id="submitBtn" class="submit-button">Send Verification Email</button>
        </form>

        <div class="back-link">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';

        // Pre-fill email from URL parameter
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            if (emailParam) {
                document.getElementById('email').value = emailParam;
            }
        });

        async function handleResend(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const alertSuccess = document.getElementById('alertSuccess');
            const alertError = document.getElementById('alertError');

            // Hide alerts
            alertSuccess.classList.remove('show');
            alertError.classList.remove('show');

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/email-verification/request`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (response.ok) {
                    alertSuccess.textContent = data.message;
                    alertSuccess.classList.add('show');
                    document.getElementById('resendForm').reset();
                } else {
                    alertError.textContent = data.detail || 'Failed to send verification email';
                    alertError.classList.add('show');
                }
            } catch (error) {
                alertError.textContent = 'Network error. Please check your connection and try again.';
                alertError.classList.add('show');
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Verification Email';
            }
        }
    </script>
</body>
</html>
